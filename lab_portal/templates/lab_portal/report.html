<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Lab Issue | JOOUST SIIS Lab Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-2xl">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Submit Lab Issue / Complaint</h2>
        
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <!-- Kept your beautiful location layout section completely intact -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select Lab Location</label>
                    {{ form.lab_room }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Computer Number / Tag</label>
                    {{ form.computer_number }}
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Issue Category</label>
                {{ form.category }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Detailed Description of the Issue</label>
                {{ form.description }}
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition dynamic duration-200 shadow">
                Submit Issue Portal Ticket
            </button>
        </form>
    </div>

</body>
</html>
